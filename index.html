<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherNow — Live Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ── Header ─────────────────────────────────── -->
    <header class="header">
      <div class="header__inner">
        <div class="logo">
          <span class="logo__icon">⛅</span>
          <span class="logo__name">WeatherNow</span>
        </div>

        <!-- Search bar -->
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            class="search-bar__input"
            placeholder="Search city…"
            autocomplete="off"
            aria-label="Search city"
          />
          <button id="searchBtn" class="search-bar__btn" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button id="locationBtn" class="btn btn--icon" title="Use my location" aria-label="Detect location">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
              <circle cx="12" cy="12" r="10" stroke-dasharray="2 4"/>
            </svg>
          </button>

          <!-- Celsius / Fahrenheit toggle -->
          <div class="unit-toggle" role="group" aria-label="Temperature unit">
            <button id="celsiusBtn" class="unit-toggle__btn active">°C</button>
            <button id="fahrenheitBtn" class="unit-toggle__btn">°F</button>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Main content ───────────────────────────── -->
    <main class="main">

      <!-- Recent searches chip list -->
      <section id="recentSection" class="recent" aria-label="Recent searches" hidden>
        <p class="recent__label">Recent</p>
        <div id="recentList" class="recent__list"></div>
      </section>

      <!-- State: Loading skeleton -->
      <div id="loadingState" class="state state--loading" hidden>
        <div class="skeleton-card large"></div>
        <div class="forecast-row">
          <div class="skeleton-card small"></div>
          <div class="skeleton-card small"></div>
          <div class="skeleton-card small"></div>
          <div class="skeleton-card small"></div>
          <div class="skeleton-card small"></div>
        </div>
      </div>

      <!-- State: Error -->
      <div id="errorState" class="state state--error" hidden>
        <div class="error-box">
          <span class="error-box__icon">⚠️</span>
          <h2 class="error-box__title">Something went wrong</h2>
          <p id="errorMessage" class="error-box__msg">Unable to fetch weather data.</p>
          <button id="retryBtn" class="btn btn--primary">Try again</button>
        </div>
      </div>

      <!-- State: Empty (initial prompt) -->
      <div id="emptyState" class="state state--empty">
        <div class="empty-box">
          <span class="empty-box__emoji">🌍</span>
          <h2 class="empty-box__title">Where are you today?</h2>
          <p class="empty-box__sub">Search a city or allow location access to see live weather.</p>
          <button id="emptyLocationBtn" class="btn btn--primary">Use my location</button>
        </div>
      </div>

      <!-- State: Success — weather data -->
      <div id="weatherContent" class="state state--success" hidden>

        <!-- Current weather card -->
        <section class="current-card" aria-label="Current weather">
          <div class="current-card__left">
            <p id="cityName" class="current-card__city">—</p>
            <p id="weatherDesc" class="current-card__desc">—</p>
            <p id="temperature" class="current-card__temp">—</p>
          </div>
          <div class="current-card__right">
            <img id="weatherIcon" class="current-card__icon" src="" alt="Weather icon" />
            <div class="stats-grid">
              <div class="stat">
                <span class="stat__label">Feels like</span>
                <span id="feelsLike" class="stat__value">—</span>
              </div>
              <div class="stat">
                <span class="stat__label">Humidity</span>
                <span id="humidity" class="stat__value">—</span>
              </div>
              <div class="stat">
                <span class="stat__label">Wind</span>
                <span id="windSpeed" class="stat__value">—</span>
              </div>
              <div class="stat">
                <span class="stat__label">Updated</span>
                <span id="lastUpdated" class="stat__value">—</span>
              </div>
            </div>
          </div>
        </section>

        <!-- 5-day forecast -->
        <section class="forecast" aria-label="5-day forecast">
          <h2 class="forecast__heading">5-Day Forecast</h2>
          <div id="forecastList" class="forecast__grid"></div>
        </section>

      </div>
    </main>

    <!-- ── Scripts ────────────────────────────────── -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
